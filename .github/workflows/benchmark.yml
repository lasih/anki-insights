name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[testing]'
      - name: Run benchmark
        run: |
          mkdir -p bench-output
          python -m bench.benchmark_dedup > bench-output/result.txt
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-output
